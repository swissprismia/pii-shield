name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build Windows release binary
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        working-directory: sidecar
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy English model
        run: python -m spacy download en_core_web_lg

      - name: Build Python sidecar
        working-directory: sidecar
        run: python build_sidecar.py

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # Build arm64 Python sidecar on native ARM64 runner
  build-sidecar-arm64:
    name: Build Python sidecar (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies and build sidecar
        working-directory: sidecar
        run: |
          pip install -r requirements.txt pyinstaller
          python -m spacy download en_core_web_lg
          python build_sidecar.py

      - name: Upload arm64 sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-arm64
          path: src-tauri/binaries/presidio-sidecar-aarch64-apple-darwin

  # Build x86_64 Python sidecar on native Intel runner
  build-sidecar-x86_64:
    name: Build Python sidecar (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies and build sidecar
        working-directory: sidecar
        run: |
          pip install -r requirements.txt pyinstaller
          python -m spacy download en_core_web_lg
          python build_sidecar.py

      - name: Upload x86_64 sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-x86_64
          path: src-tauri/binaries/presidio-sidecar-x86_64-apple-darwin

  # Build macOS release binary (universal)
  build-macos:
    name: Build (macOS Universal)
    runs-on: macos-14
    needs: [build-sidecar-arm64, build-sidecar-x86_64]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable + macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download arm64 sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-arm64
          path: src-tauri/binaries/

      - name: Download x86_64 sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-x86_64
          path: src-tauri/binaries/

      - name: Create universal sidecar binary
        run: |
          ARM64=src-tauri/binaries/presidio-sidecar-aarch64-apple-darwin
          X86=src-tauri/binaries/presidio-sidecar-x86_64-apple-darwin
          UNIVERSAL=src-tauri/binaries/presidio-sidecar-universal-apple-darwin
          chmod +x "$ARM64" "$X86"
          echo "arm64 archs: $(lipo -archs "$ARM64")"
          echo "x86_64 archs: $(lipo -archs "$X86")"
          lipo -create -output "$UNIVERSAL" "$ARM64" "$X86"
          echo "Created real universal binary: $(lipo -archs "$UNIVERSAL")"

      - name: Build Tauri app (universal)
        run: npm run tauri build -- --target universal-apple-darwin --no-sign
        env:
          APPLE_CERTIFICATE: ""
          APPLE_SIGNING_IDENTITY: ""
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # Build Linux release binary
  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxtst-dev \
            libx11-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        working-directory: sidecar
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy English model
        run: python -m spacy download en_core_web_lg

      - name: Build Python sidecar
        working-directory: sidecar
        run: python build_sidecar.py

      - name: Build Tauri app
        run: npm run tauri build -- --bundles appimage,deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets/windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-assets/macos/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-assets/linux/

      - name: Generate changelog from conventional commits
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PII Shield ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.content || 'See commit history for changes.' }}

            ## Installation

            | Platform | File |
            |----------|------|
            | Windows | `.exe` installer (NSIS) |
            | macOS (Apple Silicon + Intel) | `.dmg` disk image |
            | Linux (x64) | `.AppImage` and `.deb` packages |

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md#installation) for full installation instructions.

            ---
            > All PII processing happens **100% locally** - no data leaves your machine.
          files: |
            release-assets/windows/**
            release-assets/macos/**
            release-assets/linux/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
