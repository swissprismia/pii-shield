name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust: format, lint, test, audit ───────────────────────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxtst-dev \
            libx11-dev

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Create stubs required by Tauri macros (no frontend build needed)
        run: |
          mkdir -p src-tauri/binaries dist
          touch src-tauri/binaries/presidio-sidecar-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/presidio-sidecar-x86_64-unknown-linux-gnu

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        working-directory: src-tauri
        run: cargo audit

  # ─── Python: lint and test ─────────────────────────────────────────────────
  python-check:
    name: Python Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - name: Install dependencies
        working-directory: sidecar
        run: |
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Run Ruff linter
        working-directory: sidecar
        run: ruff check presidio_sidecar.py

      - name: Run tests
        working-directory: sidecar
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory found — skipping"
          fi

  # ─── Build: Windows ────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [rust-check, python-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        working-directory: sidecar
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy English model
        run: python -m spacy download en_core_web_lg

      - name: Build Python sidecar
        working-directory: sidecar
        run: python build_sidecar.py

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pii-shield-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ─── Build: macOS ──────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: [rust-check, python-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        working-directory: sidecar
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy English model
        run: python -m spacy download en_core_web_lg

      - name: Build Python sidecar
        working-directory: sidecar
        run: python build_sidecar.py

      - name: Build Tauri app (universal binary)
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: pii-shield-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
